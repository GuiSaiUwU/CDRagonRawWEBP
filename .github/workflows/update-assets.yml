name: Update assets

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1,15 * *'

permissions:
  contents: write

concurrency:
  group: update-assets
  cancel-in-progress: false

jobs:
  update-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Run asset updater
        run: python main.py

      - name: Checkout data repo
        uses: actions/checkout@v4
        with:
          repository: GuiSaiUwU/CDRagonRawWEBPData
          token: ${{ secrets.ASSETS_REPO_TOKEN }}
          path: data-repo

      - name: Sync assets to data repo
        run: |
          mkdir -p data-repo/assets
          rsync -a --delete assets/ data-repo/assets/

      - name: Commit and push changes
        run: |
          git -C data-repo config user.name "github-actions[bot]"
          git -C data-repo config user.email "github-actions[bot]@users.noreply.github.com"
          git -C data-repo add assets
          if git -C data-repo diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git -C data-repo commit -m "chore: update assets"
          git -C data-repo push
